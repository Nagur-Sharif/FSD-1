<!DOCTYPE html>
<html>
  <head>
	<title>CSS Box Model Example</title>
    <style>
	body {
	font-family: Arial;
	text-align: center;
	}

		/* Box Model Example */

	.box {
	width: 300px;              /* Content width */
	background-color: lightblue;
	padding: 30px;             /* Space inside the box */
	border: 5px solid blue;    /* Border around padding */
	margin: 40px auto;         /* Space outside the box */
	font-size: 18px;
	}
    </style>
  </head>
  <body>
	<h2>CSS Box Model Demonstration</h2>
	<div class="box">
		This is the CONTENT area.
		<br><br>
		Padding is the space inside the border.<br>
		Border surrounds the padding.<br>
		Margin creates space outside the box.
	</div>
  </body>
</html>

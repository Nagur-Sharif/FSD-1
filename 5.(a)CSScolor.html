<!DOCTYPE html>
<html>
  <head>
	<title>CSS Color References</title>
    <style>
	body {
	    font-family: Arial;
	    text-align: center;
	}
	.box {
	    width: 300px;
	    padding: 20px;
	    margin: 10px auto;
	    color: white;
	    font-size: 18px;
	    font-weight: bold;
	}
    /* 1. Color Name */
	.color-name {
	    background-color: Olive;
	}
    /* 2. Hex Code */
	.hex {
	    background-color: #ee82ee;
	}
    /* 3. RGB */
	.rgb {
	    background-color: rgb(90, 90, 90);
	}
    /* 4. RGBA (with transparency) */
	.rgba {
	    background-color: rgba(255, 99, 71, 0.8);
	}
    /* 5. HSL */
	.hsl {
	    background-color: hsl(0, 100%, 50%);
	}
    /* 6. HSLA (with transparency) */
	.hsla {
	    background-color: hsla(100, 100%, 64%, 1);
	}
    </style>
  </head>
  <body>
	<h2>Different Ways to Reference Colors in CSS</h2>
	    <div class="box color-name">Color Name (Olive)</div>
	    <div class="box hex">Hex Code (#ee82ee)</div>
	    <div class="box rgb">RGB (90, 90, 90)</div>
	    <div class="box rgba">RGBA (with transparency)</div>
	    <div class="box hsl">HSL (0, 100%, 50%)</div>
	    <div class="box hsla">HSLA (with transparency)</div>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
	<title>JavaScript Loops Example</title>
  </head>
  <body>
	<h2>Printing Numbers 1 to 10</h2>
    <script>
	// Using FOR loop
	document.write("<h3>Using For Loop</h3>");
	for (let i = 1; i <= 10; i++) {
	document.write(i + "<br>");
	}

	// Using WHILE loop
	document.write("<h3>Using While Loop</h3>");
	let j = 1;
	while (j <= 10) {
	document.write(j + "<br>");
	j++;
	}

	// Using DO-WHILE loop
	document.write("<h3>Using Do-While Loop</h3>");
	let k = 1;
	do {
	document.write(k + "<br>");
	k++;
	} while (k <= 10);
    </script>
  </body>
</html>

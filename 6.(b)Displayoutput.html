<!DOCTYPE html>
<html>
  <head>
	<title>JavaScript Output Methods</title>

		<!-- Internal JavaScript -->

    <script>
	function showInternalOutput() {
	// Display using alert
	alert("This message is displayed using alert()");
	// Display using document.write
	document.write("<h3>Output using document.write()</h3>");
	}
    </script>

		<!-- External JavaScript -->

    <script src="script.js"></script>
  </head>
  <body>
	<h2>JavaScript Output Methods Example</h2>
	<button onclick="showInternalOutput()">Internal JS Output</button>
	<button onclick="showExternalOutput()">External JS Output</button>
	<button onclick="takeInput()">Input and Type Conversion</button>
	<p id="demo"></p>
  </body>
</html>

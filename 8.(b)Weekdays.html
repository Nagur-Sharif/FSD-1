<!DOCTYPE html>
<html>
  <head>
	<title>Week Days using Switch Case</title>
  </head>
  <body>
	<h2>Display Week Day</h2>
    <script>
	// Take input from user
	let day = parseInt(prompt("Enter a number (1-7):"));
	let dayName;
	// Switch case to display weekday
	switch(day) {
	case 1:
	    dayName = "Sunday";
	    break;
	case 2:
	    dayName = "Monday";
	    break;
	case 3:
	    dayName = "Tuesday";
	    break;
	case 4:
	    dayName = "Wednesday";
	    break;
	case 5:
	    dayName = "Thursday";
	    break;
	case 6:
	    dayName = "Friday";
	    break;
	case 7:
	    dayName = "Saturday";
	    break;
	default:
	    dayName = "Invalid input! Please enter a number between 1 and 7.";
	}
	// Display output
	document.write("<h3>Day: " + dayName + "</h3>");
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
	<title>Larger Number Display</title>
    <script>
	function findLargest() {
	let a = parseInt(prompt("Enter first integer:"));
	let b = parseInt(prompt("Enter second integer:"));
	let c = parseInt(prompt("Enter third integer:"));
	if (a == b && b == c) {
	document.getElementById("result").innerHTML = "EQUAL NUMBERS";
	}
	else {
	let largest = Math.max(a, b, c);
	document.getElementById("result").innerHTML = largest + " LARGER NUMBER";
	  }
	}
    </script>
  </head>
  <body>
	<h2>Find the Largest Number</h2>
	<button onclick="findLargest()">Enter Numbers</button>
	<p id="result"></p>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
	<title>Date Object Example</title>
  </head>
  <body>
	<h2>JavaScript Date Object Program</h2>
	<p id="output"></p>
    <script>

		// Create Date object

	let today = new Date();

		// Using Date properties & methods

	let day = today.getDate();          // Day (1-31)
	let month = today.getMonth() + 1;   // Month (0-11 so +1)
	let year = today.getFullYear();     // Year

	let hours = today.getHours();       // Hours
	let minutes = today.getMinutes();   // Minutes
	let seconds = today.getSeconds();   // Seconds

		// Display result

	document.getElementById("output").innerHTML =
	"Current Date: " + day + "/" + month + "/" + year + "<br>" +
	"Current Time: " + hours + ":" + minutes + ":" + seconds;
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
	<title>JavaScript Object Loops</title>
  </head>
  <body>
	<h2>JavaScript Object Loop Example</h2>
	<p id="forin"></p>
	<p id="foreach"></p>
	<p id="forof"></p>
    <script>

		// Creating an object

	let student = {
	name: "Nagur Sharif",
	age: 19,
	course: "Data Science",
	city: "Guntur"
	};

		// 1. Using for-in loop

	let text1 = "Using for-in loop:<br>";
	for (let key in student) {
	text1 += key + " : " + student[key] + "<br>";
	}
	document.getElementById("forin").innerHTML = text1;

		// 2. Using for-each loop

	let text2 = "Using for-each loop:<br>";2
	Object.entries(student).forEach(function(item){
	text2 += item[0] + " : " + item[1] + "<br>";
	});
	document.getElementById("foreach").innerHTML = text2;

		// 3. Using for-of loop

	let text3 = "Using for-of loop:<br>";
	for (let [key,value] of Object.entries(student)) {
	text3 += key + " : " + value + "<br>";
	}
	document.getElementById("forof").innerHTML = text3;
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
	<title>Functions and Events</title>
    <script>
	function getNumber() {
	return parseInt(document.getElementById("num").value);
	}

		// Factorial Function

	function factorial() {
	let n = getNumber();
	let fact = 1;

	if (n < 0) {
	document.getElementById("result").innerHTML = "Factorial not possible";
	return;
	}

	for (let i = 1; i <= n; i++) {
	fact *= i;
	}

	document.getElementById("result").innerHTML = "Factorial: " + fact;
	}

		// Fibonacci Function

	function fibonacci() {
	let n = getNumber();
	let a = 0, b = 1, result = "Fibonacci: ";

	for (let i = 1; i <= n; i++) {
	result += a + " ";
	let temp = a + b;
	a = b;
	b = temp;
	}

	document.getElementById("result").innerHTML = result;
	}

		// Prime Numbers Function

	function prime() {
	let n = getNumber();
	let result = "Prime numbers: ";

	for (let i = 2; i <= n; i++) {
	let isPrime = true;

	for (let j = 2; j <= Math.sqrt(i); j++) {
	if (i % j === 0) {
	isPrime = false;
	break;
	  }
	}

	if (isPrime) {
	result += i + " ";
	  }
	}

	document.getElementById("result").innerHTML = result;
	}

		// Palindrome Function

	function palindrome() {
	let n = getNumber().toString();
	let rev = n.split('').reverse().join('');

	if (n === rev) {
	  document.getElementById("result").innerHTML = n + " is a Palindrome";
	} else {
	  document.getElementById("result").innerHTML = n + " is NOT a Palindrome";
	  }
	}
    </script>
  </head>
  <body style="text-align:center; font-family:Arial;">
	<h2>JavaScript Functions and Events</h2>
	<input type="text" id="num" placeholder="Enter a number"><br><br>
	<button onclick="factorial()">Factorial</button>
	<button onclick="fibonacci()">Fibonacci</button>
	<button onclick="prime()">Prime</button>
	<button onclick="palindrome()">Palindrome</button>
	<h3 id="result"></h3>
  </body>
</html>
